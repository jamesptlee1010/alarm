name: Build MathWakeAlarm APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    defaults:
      run:
        working-directory: MathWakeAlarm_online_build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Apply Compose FlowRow compatibility fix
        shell: bash
        run: |
          FILE="app/src/main/java/com/james/mathwakealarm/MainActivity.kt"
          if ! grep -q 'ExperimentalLayoutApi' "$FILE"; then
            sed -i '/import androidx.compose.foundation.layout.FlowRow/a import androidx.compose.foundation.layout.ExperimentalLayoutApi' "$FILE"
            sed -i 's/@OptIn(ExperimentalMaterial3Api::class)/@OptIn(ExperimentalMaterial3Api::class, ExperimentalLayoutApi::class)/' "$FILE"
          fi

      - name: Build signed release APK
        run: gradle --no-daemon clean :app:assembleRelease

      - name: Verify APK signature
        shell: bash
        run: |
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --verbose --print-certs app/build/outputs/apk/release/app-release.apk

      - name: Prepare installable APK
        run: cp app/build/outputs/apk/release/app-release.apk ../MathWakeAlarm.apk

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: MathWakeAlarm-installable-APK
          path: MathWakeAlarm.apk
          if-no-files-found: error
          retention-days: 30
